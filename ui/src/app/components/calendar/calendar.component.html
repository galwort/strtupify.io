<div class="content-container">
  <div class="header">
    <div class="title">Calendar</div>
  </div>

  <div class="content-body">
    <div class="layout">
      <div class="calendar-shell">
        <div class="calendar" [class.locked]="calendarLocked" [class.mobile-drag-active]="touchMode && !!draggingMeetingId">
          <div class="submitted-watermark" *ngIf="showSubmittedOverlay">
            <div class="watermark-text">RESCHEDULES SENT FOR THIS WEEK</div>
          </div>
          <div class="time-column">
            <div class="time-slot" *ngFor="let t of timeTicks">{{ t }}</div>
          </div>
          <div class="day-column" *ngFor="let d of weekDays; let di = index">
            <div class="day-header">
              <span class="day-name" *ngIf="!touchMode">{{ dayNameLabel(d) }}</span>
              <span class="day-date">{{ dayDateLabel(d) }}</span>
            </div>
            <div
              class="day-body"
              [attr.data-day-index]="di"
              (dragover)="onDayDragOver($event, di)"
              (dragleave)="onDayDragLeave($event, di)"
              (drop)="onDayDrop($event, di)"
            >
              <div
                class="meeting"
                *ngFor="let ev of visualByDay[di]"
                [class.user]="ev.owner === 'me'"
                [class.selected]="ev.id === selectedMeetingId && ev.owner === 'me'"
                [class.dragging]="ev.id === draggingMeetingId"
                [attr.draggable]="!calendarLocked && ev.owner === 'me' && !touchMode ? 'true' : null"
                [style.top.%]="ev.top"
                [style.height.%]="ev.height"
                [style.left.%]="ev.left"
                [style.width.%]="ev.width"
                [style.background]="ev.bg"
                [style.borderColor]="ev.border"
                (click)="onMeetingClick(ev)"
                (dragstart)="onMeetingDragStart($event, ev)"
                (dragend)="onMeetingDragEnd()"
                (touchstart)="onMeetingTouchStart($event, ev)"
                (touchmove)="onMeetingTouchMove($event)"
                (touchend)="onMeetingTouchEnd($event)"
                (touchcancel)="onMeetingTouchCancel()"
                [attr.title]="meetingTitle(ev)"
              >
                <div class="dots" *ngIf="ev.participantDots.length">
                  <span *ngFor="let c of ev.participantDots" [style.background]="c"></span>
                </div>
              </div>
              <div
                class="drop-preview"
                *ngIf="dragPreview && dragPreview.dayIndex === di && !calendarLocked"
                [class.conflict]="dragPreview.conflict"
                [style.top.%]="dragPreview.top"
                [style.height.%]="dragPreview.height"
                [style.left.%]="dragPreview.left"
                [style.width.%]="dragPreview.width"
              ></div>
            </div>
          </div>
        </div>
      </div>

      <div class="sidebar">
        <div class="panel focus-panel">
          <div class="week-label" *ngIf="weekLabel && !touchMode">{{ weekLabel }}</div>
          <div class="score">Focus score: {{ focusScore | number: '1.0-1' }}</div>
          <button
            type="button"
            class="submit"
            [disabled]="isSubmitting || calendarLocked"
            (click)="submitSchedule()"
          >
            {{
              calendarLocked
                ? 'Reschedules Sent'
                : isSubmitting
                ? 'Submitting...'
                : 'Send reschedules'
            }}
          </button>
        </div>

        <div class="panel" *ngIf="!touchMode">
          <div class="control-title">Calendars</div>
          <div class="employees">
            <label *ngFor="let emp of employees">
              <input
                type="checkbox"
                [checked]="selectedEmployees.has(emp.id)"
                (change)="toggleEmployee(emp.id, $any($event.target).checked)"
                [style.accentColor]="emp.color"
              />
              <span class="dot" [style.background]="emp.color"></span>
              <span class="name">{{ emp.name }}</span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
