<div class="content-container">
  <div class="header">
    <div class="title">Kanban</div>
  </div>

  <div class="filter-container" *ngIf="touchMode">
    <button
      type="button"
      class="filter-btn"
      *ngFor="let filter of mobileFilters"
      [class.active]="mobileFilter === filter.id"
      (click)="setMobileFilter(filter.id)"
    >
      <span>{{ filter.label }}</span>
      <span class="count">{{ mobileFilterCount(filter.id) }}</span>
    </button>
  </div>

  <div class="content-body">
    <ng-template #avatarBubble let-item>
      <ng-container *ngIf="hiresLoading; else avatarResolved">
        <div class="avatar-bubble skeleton" title="Loading assignee"></div>
      </ng-container>
      <ng-template #avatarResolved>
        <ng-container *ngIf="assigneeFor(item) as assignee; else avatarUnassigned">
          <div
            class="avatar-bubble"
            [class.fallback]="!assignee.avatarUrl"
            [attr.title]="assignee.name + (assignee.title ? ' - ' + assignee.title : '')"
          >
            <img
              *ngIf="assignee.avatarUrl"
              [src]="assignee.avatarUrl"
              [alt]="assignee.name + ' avatar'"
            />
            <span *ngIf="!assignee.avatarUrl">{{ assignee.initials }}</span>
          </div>
        </ng-container>
      </ng-template>
      <ng-template #avatarUnassigned>
        <div class="avatar-bubble fallback" title="Unassigned">
          <span class="material-symbols-outlined">person</span>
        </div>
      </ng-template>
    </ng-template>

    <ng-template #assignSelect let-item>
      <div class="assign">
        <select
          (change)="reassign(item, $any($event.target).value)"
          [disabled]="item.status === 'done' || hiresLoading"
        >
          <option value="" [selected]="!item.assignee_id">Unassigned</option>
          <option *ngFor="let e of hires" [value]="e.id" [selected]="e.id === item.assignee_id">
            {{ e.name }}{{ e.title ? ' - ' + e.title : '' }}
          </option>
        </select>
      </div>
    </ng-template>

    <ng-template #taskCard let-it>
      <div
        class="card"
        [class.doing]="isDoingStatus(it)"
        [class.done]="it.status === 'done'"
        [attr.draggable]="canDrag(it) ? 'true' : null"
        (dragstart)="onDragStart($event, it)"
        (dragend)="onDragEnd()"
      >
        <div class="card-header">
          <div class="card-title">{{ it.title }}</div>
          <ng-container
            *ngTemplateOutlet="avatarBubble; context: { $implicit: it }"
          ></ng-container>
        </div>
        <ng-container
          *ngTemplateOutlet="assignSelect; context: { $implicit: it }"
        ></ng-container>
        <div class="progress" *ngIf="isDoingStatus(it)">
          <div class="bar">
            <div class="fill" [style.width.%]="progress(it)"></div>
          </div>
          <div class="pct">{{ progress(it) }}%</div>
        </div>
        <div class="blockers" [attr.title]="blockerTitle(it)">
          Blockers: {{ remainingBlockers(it) }}
        </div>
        <div class="card-desc">{{ it.description }}</div>
        <div class="mobile-status" *ngIf="touchMode">
          <button
            *ngIf="it.status !== 'done'; else mobileDoneState"
            type="button"
            class="status-toggle"
            [class.doing]="isMobileToggleDoing(it)"
            [class.pending]="isMobileStatusPending(it)"
            [disabled]="isMobileStatusPending(it)"
            (click)="toggleMobileStatus(it)"
          >
            <span class="status-thumb"></span>
            <span class="status-option">Do</span>
            <span class="status-option">Doing</span>
          </button>
          <ng-template #mobileDoneState>
            <div class="done-chip">Done</div>
          </ng-template>
        </div>
      </div>
    </ng-template>

    <div class="kanban" *ngIf="!touchMode; else mobileListView">
      <div
        class="column"
        [class.drop-target]="dragHoverColumn === 'todo'"
        (dragover)="onDragOver($event, 'todo')"
        (dragleave)="onDragLeave('todo')"
        (drop)="onDrop($event, 'todo')"
      >
        <div class="col-header">
          <div class="col-title">Do</div>
          <div class="count">{{ todo.length }}</div>
        </div>
        <div class="cards">
          <ng-container *ngFor="let it of todo">
            <ng-container
              *ngTemplateOutlet="taskCard; context: { $implicit: it }"
            ></ng-container>
          </ng-container>
        </div>
      </div>

      <div
        class="column"
        [class.drop-target]="dragHoverColumn === 'doing'"
        (dragover)="onDragOver($event, 'doing')"
        (dragleave)="onDragLeave('doing')"
        (drop)="onDrop($event, 'doing')"
      >
        <div class="col-header">
          <div class="col-title">Doing</div>
          <div class="count">{{ doing.length }}</div>
        </div>
        <div class="cards">
          <ng-container *ngFor="let it of doing">
            <ng-container
              *ngTemplateOutlet="taskCard; context: { $implicit: it }"
            ></ng-container>
          </ng-container>
        </div>
      </div>

      <div
        class="column"
        (dragover)="onDragOver($event, 'done')"
        (dragleave)="onDragLeave('done')"
        (drop)="onDrop($event, 'done')"
      >
        <div class="col-header">
          <div class="col-title">Done</div>
          <div class="count">{{ done.length }}</div>
        </div>
        <div class="cards">
          <ng-container *ngFor="let it of done">
            <ng-container
              *ngTemplateOutlet="taskCard; context: { $implicit: it }"
            ></ng-container>
          </ng-container>
        </div>
      </div>
    </div>

    <ng-template #mobileListView>
      <div class="mobile-list">
        <ng-container *ngIf="mobileListItems.length; else emptyMobileList">
          <ng-container *ngFor="let it of mobileListItems">
            <ng-container
              *ngTemplateOutlet="taskCard; context: { $implicit: it }"
            ></ng-container>
          </ng-container>
        </ng-container>
        <ng-template #emptyMobileList>
          <div class="empty-state">
            <div class="empty-title">No cards in this view</div>
            <div class="empty-copy">Try another filter.</div>
          </div>
        </ng-template>
      </div>
    </ng-template>
  </div>
</div>
